<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | CatFinder</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --primary: #f97316; --bg: #fefce8; --text: #1c1917; --muted: #78716c; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 6rem; color: var(--primary); margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; max-width: 400px; }
    a { color: var(--primary); text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .btn { background: var(--primary); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; }
    .btn:hover { background: #ea580c; text-decoration: none; }
  </style>
</head>
<body>
  <h1>🐱</h1>
  <h2>Page Not Found</h2>
  <p>Sorry, the page you're looking for doesn't exist or has been moved. Our cats are working hard to find it!</p>
  <div class="links">
    <a href="/" class="btn">Go Home</a>
    <a href="/quiz/">Take the Quiz</a>
    <a href="/search/">Search Breeds</a>
  </div>
</body>
</html>
